<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>git://find — GitHub Profile Finder</title>
    <meta name="description" content="Look up any GitHub user by handle." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="grid-bg"></div>

    <div class="page">
      <header>
        <div class="brand">
          <span class="prompt">git@find</span>:~$<span class="caret"></span>
        </div>

        <div class="badge">
          <span class="dot"></span>
          GitHub REST API · live
        </div>
      </header>

      <main>
        <div class="intro">
          <span class="tag">Profile Lookup</span>

          <h1>
            Find any dev on
            <span class="accent">GitHub</span>, instantly.
          </h1>

          <p>
            Type a username. We'll pull their avatar, bio, and stats straight
            from the source.
          </p>
        </div>

        <div class="terminal">
          <div class="term-bar">
            <span class="tl r"></span>
            <span class="tl y"></span>
            <span class="tl g"></span>

            <span class="path">~/find-user</span>
          </div>

          <div class="term-body">
            <form class="search-row" id="searchForm">
              <span class="prompt-sym">➜</span>

              <span class="prefix">find</span>

              <input
                id="username"
                type="text"
                placeholder="octocat"
                autocomplete="off"
                spellcheck="false"
              />

              <button class="go-btn" type="submit" id="goBtn">run ↵</button>
            </form>

            <div class="hint-row">
              <button type="button" class="chip" data-user="TheReal-Diego">
                TheReal-Diego
              </button>

              <!--
<button class="chip" data-user="gaearon">gaearon</button>
<button class="chip" data-user="octocat">octocat</button>
<button class="chip" data-user="sindresorhus">sindresorhus</button>
-->
            </div>
          </div>
        </div>

        <div class="status" id="status"></div>

        <div id="result"></div>
      </main>

      <footer>
        <!--
find-user · built on the public GitHub REST API
-->
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
